# set channel priority to flexible: 
# conda config --set channel_priority flexible
# why? mafft is on conda-forge but not v7.407
name: scarap_min
channels: 
  - conda-forge
  - nodefaults
dependencies:
  - bioconda::mafft=7.407
  - bioconda::mmseqs2=11.e1a1c
  - python=3.10 # minimum for ete v4
  - biopython=1.79
  - ete4=4.1.1  
  - numpy=1.21.6 # minimum for python v3.10
  - scipy=1.7.3 # minimum for python 3.10
  - pandas=1.3.5
  - pip
  - pip:
    - --editable ..
